name: Selenium POM CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium Tests
        run: mvn -B test -Dheadless=true -Djava.awt.headless=true

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          retention-days: 7

      - name: Read TestNG Results
        if: always()
        id: test-summary
        run: |
          FILE="target/surefire-reports/testng-results.xml"

          if [ -f "$FILE" ]; then
            TOTAL=$(grep -oP 'total="\K[0-9]+' "$FILE" | head -1)
            PASSED=$(grep -oP 'passed="\K[0-9]+' "$FILE" | head -1)
            FAILED=$(grep -oP 'failed="\K[0-9]+' "$FILE" | head -1)     
          else
            TOTAL=0
            PASSED=0
            FAILED=0
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          {
            echo "message<<MSG_EOF"
            echo "Result: ${{ job.status }}
            echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED"
            echo "Detail: ${{ github.server_url }}/${{ github.respository }}/actions/runs/${{ github.run_id }}"
            echo "MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Report to Slack
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{secrets.SLACK_WEBHOOK_URL}}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{steps.test-summary.outputs.message}}"
            }