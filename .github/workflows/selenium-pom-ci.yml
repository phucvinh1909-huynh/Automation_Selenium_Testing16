name: Selenium POM CI
on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - "testng.xml"
      - ".github/workflows/selenium-pom-ci.yml"
  pull_request:
    branches:
      - main



jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium Tests
        run: mvn -B test -Dheadless=true -Djava.awt.headless=true